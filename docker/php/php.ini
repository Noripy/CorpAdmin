; アプリ共通の PHP 設定（本番寄り）
; dev ステージでは opcache.validate_timestamps=1 を別ファイルで上書きしている。

; --- 実行リソース ---
memory_limit = 256M
max_execution_time = 60

; --- アップロード（社員の顔写真・CSVインポート等を想定） ---
upload_max_filesize = 20M
post_max_size = 21M

; --- 文字・タイムゾーン ---
default_charset = "UTF-8"
date.timezone = "Asia/Tokyo"

; --- エラー表示（本番は画面に出さずログへ） ---
display_errors = Off
log_errors = On

; --- OPcache（本番の実行速度を大きく左右する） ---
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
; 本番はファイルのタイムスタンプを見ない（デプロイ時にキャッシュを明示クリアする）
; → これにより毎リクエストのstat()が消えて速くなる。devステージでは1に上書き。
opcache.validate_timestamps = 0
