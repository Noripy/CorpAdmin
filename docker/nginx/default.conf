server {
    listen 80;
    # 注意: 本来は公式nginxイメージの起動スクリプトが IPv6用の listen を自動追記するが、
    # このファイルを :ro (読み取り専用) でマウントしているため書き込めず失敗する
    # （起動ログに "can not modify ... read-only file system?" と出る）。
    # macOS(OrbStack/Docker Desktop) は localhost を IPv6(::1) 優先で解決するため、
    # IPv6側の listen が無いと接続がリセットされる。よってここで明示的に追加する。
    listen [::]:80;
    server_name _;

    # Laravel の公開ディレクトリは public/。ここを document root にするのが鉄則。
    root /var/www/html/public;
    index index.php;

    charset utf-8;
    client_max_body_size 21M;   # php.ini の post_max_size と揃える

    # 軽いセキュリティヘッダ
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # すべてのリクエストを front controller(index.php)に流す Laravel の定石
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    # PHP は同一 compose ネットワーク内の app サービス:9000(php-fpm) へ渡す
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    # .env や .git などのドットファイルへの直接アクセスを遮断（.well-knownは許可）
    location ~ /\.(?!well-known).* {
        deny all;
    }
}